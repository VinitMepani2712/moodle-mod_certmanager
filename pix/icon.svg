<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a52;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d4a63;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Left Ribbon -->
  <polygon points="10,25 20,32 20,50 12,62" fill="#0d7a7a"/>
  
  <!-- Right Ribbon -->
  <polygon points="90,25 80,32 80,50 88,62" fill="#0d7a7a"/>

  <!-- Certificate Body -->
  <rect x="15" y="15" width="70" height="60" rx="4" fill="url(#bgGrad)" stroke="#1a3a52" stroke-width="2"/>
  
  <!-- Certificate White Content Area -->
  <rect x="22" y="24" width="56" height="42" rx="2" fill="#ffffff" opacity="0.95"/>

  <!-- Title Text -->
  <text x="50" y="42" font-family="Georgia, serif" font-size="9" font-weight="bold" text-anchor="middle" fill="#1a3a52">Certificate</text>

  <!-- Decorative Lines -->
  <line x1="30" y1="48" x2="70" y2="48" stroke="#0d7a7a" stroke-width="1" opacity="0.5"/>
  <line x1="33" y1="53" x2="67" y2="53" stroke="#0d7a7a" stroke-width="0.8" opacity="0.4"/>
  <line x1="33" y1="58" x2="62" y2="58" stroke="#0d7a7a" stroke-width="0.8" opacity="0.4"/>

  <!-- Gold Seal Circle (bottom right) -->
  <circle cx="70" cy="68" r="12" fill="#d4a574"/>
  <circle cx="70" cy="68" r="11" fill="#e8c89a"/>
  
  <!-- Checkmark in Seal -->
  <path d="M 65 68 L 67 70 L 73 63" stroke="#1a3a52" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>