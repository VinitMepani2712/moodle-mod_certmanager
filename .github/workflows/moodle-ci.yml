name: Moodle Plugin CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: 'postgres'
          POSTGRES_HOST_AUTH_METHOD: 'trust'
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 3

    strategy:
      fail-fast: false
      matrix:
        include:
          # Moodle 4.1 LTS
          - php: '8.1'
            moodle-branch: 'MOODLE_401_STABLE'
            database: pgsql
          # Moodle 4.5 LTS
          - php: '8.3'
            moodle-branch: 'MOODLE_405_STABLE'
            database: pgsql
          # Moodle 5.0
          - php: '8.2'
            moodle-branch: 'MOODLE_500_STABLE'
            database: pgsql
          # Moodle 5.1
          - php: '8.3'
            moodle-branch: 'MOODLE_501_STABLE'
            database: pgsql
          # Moodle 5.2
          - php: '8.3'
            moodle-branch: 'MOODLE_502_STABLE'
            database: pgsql

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          path: plugin

      # This block depends on availability_prerequisite. moodle-plugin-ci needs
      # that plugin present to install the site, so check it out too.
      # Adjust "repository" if your dependency lives elsewhere.
      - name: Check out dependency (availability_prerequisite)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/moodle-availability_prerequisite
          path: deps/availability_prerequisite

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pgsql, pdo_pgsql
          ini-values: max_input_vars=5000
          coverage: none

      - name: Initialise moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci ci ^4
          echo $(cd ci/bin; pwd) >> $GITHUB_PATH
          echo $(cd ci/vendor/bin; pwd) >> $GITHUB_PATH
          sudo locale-gen en_AU.UTF-8
          echo "NVM_DIR=$HOME/.nvm" >> $GITHUB_ENV

      - name: Install moodle-plugin-ci
        run: moodle-plugin-ci install --plugin ./plugin --extra-plugins ./deps --db-host=127.0.0.1
        env:
          DB: ${{ matrix.database }}
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}

      - name: PHP Lint
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phplint

      - name: PHP Mess Detector
        continue-on-error: true
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpmd

      - name: Moodle Code Checker
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpcs --max-warnings 0

      - name: Moodle PHPDoc Checker
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpdoc --max-warnings 0

      - name: Validating
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci validate

      - name: Check upgrade savepoints
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci savepoints

      - name: Mustache Lint
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci mustache

      - name: PHPUnit tests
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpunit

      - name: Mark cancelled jobs as failed
        if: ${{ cancelled() }}
        run: exit 1
